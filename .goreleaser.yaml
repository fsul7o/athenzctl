version: 2

project_name: athenzctl

before:
  hooks:
    - go mod tidy

builds:
  - id: athenzctl
    main: ./cmd/athenzctl
    binary: athenzctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/fsul7o/athenzctl/internal/version.Version={{.Version}}
      - -X github.com/fsul7o/athenzctl/internal/version.Commit={{.ShortCommit}}
      - -X github.com/fsul7o/athenzctl/internal/version.Date={{.Date}}

archives:
  - id: athenzctl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: true

brews:
  - name: athenzctl
    repository:
      owner: fsul7o
      name: homebrew-athenzctl
    description: "Unified kubectl-style CLI for Athenz"
    homepage: "https://github.com/fsul7o/athenzctl"
    license: "Apache-2.0"
    install: |
      bin.install "athenzctl"
    test: |
      system "#{bin}/athenzctl", "version"
