name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: make test

      - name: Run go vet
        run: make lint

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up KinD
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Start Athenz test stack
        run: >-
          make
          E2E_UP_TARGETS='deploy-kubernetes-crypki-softhsm use-kubernetes-crypki-softhsm
          deploy-kubernetes-athenz check-kubernetes-athenz deploy-kubernetes-athenz-oauth2'
          e2e-up

      - name: Run E2E tests
        run: make e2e
